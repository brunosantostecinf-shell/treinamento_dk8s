# CSR de usuário “developer” para o cluster Kubernetes
#
# 1) request: CSR em PEM codificado em base64 (gerado por openssl req -new ... | base64 | tr -d '\n')
# 2) signerName: qual controller fará a assinatura quando o CSR for aprovado.
# 3) expirationSeconds: duração do certificado emitido em segundos.
# 4) usages: finalidades que o certificado deve suportar.

apiVersion: certificates.k8s.io/v1  # API group/v1 para CSR
kind: CertificateSigningRequest   # Recurso CSR do Kubernetes
metadata:
  name: developer   # Nome da solicitação de certificado
spec:
  request:   # CSR codificado em base64, gerado com openssl req + base64
  signerName: kubernetes.io/kube-apiserver-client  # Signer para auth de cliente API Server
  expirationSeconds: 31536000  # Validade do certificado: 365 dias
  usages:
  - client auth  # Uso do certificado: autenticação de cliente
